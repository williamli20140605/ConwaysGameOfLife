<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lenia (JS)</title>
  <style>
    :root {
      --bg: #0f0d14;
      --panel: #1a1523;
      --text: #f2ebff;
      --line: #3b2d57;
      --accent: #ffb347;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: ui-rounded, "Avenir Next", "Trebuchet MS", sans-serif;
      background: linear-gradient(160deg, #130f1c, #0d0a13 50%, #16111f);
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 10px;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      border-bottom: 1px solid var(--line);
    }
    button, input {
      background: #241d33;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
    }
    button:hover { border-color: var(--accent); cursor: pointer; }
    .wrap { display: grid; place-items: center; padding: 8px; }
    canvas { border: 1px solid var(--line); max-width: 100%; max-height: 100%; }
    #meta { font-size: 12px; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="bar">
    <button id="toggleBtn">Start</button>
    <button id="seedBtn">Reseed</button>
    <label>dt <input id="dtInput" type="number" min="0.01" max="0.5" step="0.01" value="0.1"></label>
    <label>mu <input id="muInput" type="number" min="0.05" max="0.5" step="0.01" value="0.15"></label>
    <label>sigma <input id="sigmaInput" type="number" min="0.01" max="0.2" step="0.01" value="0.03"></label>
    <span id="meta"></span>
  </div>
  <div class="wrap">
    <canvas id="canvas" width="960" height="640"></canvas>
  </div>
  <script src="app.js"></script>
</body>
</html>
