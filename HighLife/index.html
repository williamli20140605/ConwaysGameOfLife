<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HighLife (B36/S23)</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --text: #e6edf3;
      --muted: #8b949e;
      --line: #30363d;
      --accent: #2ea043;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    .bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    button, input {
      background: #21262d;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 10px;
    }

    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }

    .canvas-wrap {
      display: grid;
      place-items: center;
      padding: 8px;
    }

    canvas {
      max-width: 100%;
      max-height: 100%;
      border: 1px solid var(--line);
      image-rendering: pixelated;
    }

    .meta { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="bar">
    <button id="toggleBtn">Start</button>
    <button id="stepBtn">Step</button>
    <button id="clearBtn">Clear</button>
    <button id="randBtn">Random</button>
    <label>Speed(ms) <input id="speedInput" type="number" min="10" max="1000" value="80"></label>
    <span class="meta" id="meta"></span>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas" width="960" height="640"></canvas>
  </div>
  <script src="app.js"></script>
</body>
</html>
