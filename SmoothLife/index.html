<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmoothLife (JS)</title>
  <style>
    :root {
      --bg: #0a0f14;
      --panel: #131b23;
      --text: #dce8f5;
      --line: #2c3a48;
      --accent: #4fb3ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #13202b, #0a0f14 45%);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    .bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: color-mix(in srgb, var(--panel) 90%, transparent);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(6px);
    }
    button, input {
      border: 1px solid var(--line);
      color: var(--text);
      background: #17222d;
      border-radius: 7px;
      padding: 6px 10px;
    }
    button:hover { border-color: var(--accent); cursor: pointer; }
    .wrap { display: grid; place-items: center; padding: 8px; }
    canvas { border: 1px solid var(--line); max-width: 100%; max-height: 100%; }
    #meta { font-size: 12px; opacity: 0.85; }
  </style>
</head>
<body>
  <div class="bar">
    <button id="toggleBtn">Start</button>
    <button id="seedBtn">Reseed</button>
    <label>dt <input id="dtInput" type="number" min="0.01" max="1" step="0.01" value="0.12"></label>
    <label>R <input id="rInput" type="number" min="3" max="20" step="1" value="8"></label>
    <span id="meta"></span>
  </div>
  <div class="wrap">
    <canvas id="canvas" width="960" height="640"></canvas>
  </div>
  <script src="app.js"></script>
</body>
</html>
